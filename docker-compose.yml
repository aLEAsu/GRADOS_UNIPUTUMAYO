services:
  postgres:
    image: postgres:16-alpine
    container_name: itp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: plataforma_grados
      POSTGRES_USER: itp_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-itp_dev_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itp_admin -d plataforma_grados"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itp-backend
    restart: unless-stopped
    ports:
      - "4000:3000"
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://itp_admin:${DB_PASSWORD:-itp_dev_2024}@postgres:5432/plataforma_grados
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - signatures_data:/app/signatures
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itp-frontend
    restart: unless-stopped
    ports:
      - "8069:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  uploads_data:
  signatures_data:
